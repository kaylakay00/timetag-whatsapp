<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Local Time</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111b21;
      color: #e9edef;
    }

    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #00a884;
      letter-spacing: 0.2px;
    }

    .header p {
      font-size: 11px;
      color: #8696a0;
      margin-top: 3px;
      line-height: 1.4;
    }

    .section {
      padding: 12px 16px;
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8696a0;
      margin-bottom: 10px;
    }

    .override-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
    }

    .override-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
    }

    .override-name {
      color: #e9edef;
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 8px;
    }

    .override-tz {
      color: #00a884;
      font-size: 10px;
      font-family: monospace;
      flex-shrink: 0;
    }

    .override-del {
      background: none;
      border: none;
      color: #8696a0;
      cursor: pointer;
      font-size: 14px;
      margin-left: 6px;
      padding: 0 2px;
      line-height: 1;
    }

    .override-del:hover { color: #ef4444; }

    .empty-state {
      font-size: 12px;
      color: #8696a0;
      text-align: center;
      padding: 12px 0;
      line-height: 1.5;
    }

    .tip {
      padding: 10px 16px 14px;
      font-size: 11px;
      color: #8696a0;
      line-height: 1.5;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .tip strong {
      color: #00a884;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⏱ WhatsApp Local Time</h1>
    <p>Shows local time next to each contact based on their phone country code.</p>
  </div>

  <div class="section">
    <div class="section-title">Manual Overrides</div>
    <div class="override-list" id="overrideList">
      <div class="empty-state">No overrides yet.<br>Click any time tag in WhatsApp to override.</div>
    </div>
  </div>

  <div class="tip">
    <strong>Tip:</strong> Click any 🕐 time tag in WhatsApp Web to manually set that contact's timezone.
  </div>

  <script src="popup.js"></script>
</body>
</html>
